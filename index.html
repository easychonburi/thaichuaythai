<!DOCTYPE html>

  import { getDatabase, ref, push, set, onValue, query, orderByChild, startAt, endAt } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ใส่ค่า Firebase Config ของวิวเรียบร้อยแล้วครับ 🟢
  const firebaseConfig = {
    apiKey: "AIzaSyBH0apV5G9ybf57LUp7G4Ne01eioBwwnn4",
    authDomain: "easy-thai-chuay-thai.firebaseapp.com",
    databaseURL: "https://easy-thai-chuay-thai-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "easy-thai-chuay-thai",
    storageBucket: "easy-thai-chuay-thai.firebasestorage.app",
    messagingSenderId: "944059672521",
    appId: "1:944059672521:web:411971683842ac51cb6a18"
  };

  // เริ่มต้นทำงาน Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ส่งผ่านฟังก์ชันไปให้ระบบ JavaScript ด้านล่างเรียกใช้ได้
  window.db = db;
  window.dbRef = ref;
  window.dbPush = push;
  window.dbSet = set;
  window.dbOnValue = onValue;
  window.dbQuery = query;
  window.dbOrderBy = orderByChild;
  window.dbStart = startAt;
  window.dbEnd = endAt;

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {

}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
  padding: 18px 20px 14px;
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 38px;
  height: 38px;

  justify-content: center;

}
.header-title {

}
.header-sub {
  font-size: 11px;

}

/* ── NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;

  width: 100%;
  max-width: 430px;
  background: var(--white);

  display: flex;
  z-index: 200;

}
.nav-btn {
  flex: 1;

  border: none;
  cursor: pointer;

  align-items: center;

  font-size: 11px;
  font-weight: 500;

}
.nav-btn.active { color: var(--blue); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── MAIN ── */
.main { padding: 14px 14px 90px; }

/* ── CARD ── */
.card {
  background: var(--white);

}
.card-label {

}

/* ── FIELD ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.label {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}
.input {

  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 11px;
  font-family: 'Prompt', sans-serif;
  font-size: 14px;

  background: var(--bg);
  transition: border-color 0.15s, background 0.15s;

}

/* ── AMOUNT INPUT ── */

.amount-prefix {

}
.input.amount {

/* ── SALE DATE DISPLAY ── */

/* ── BRANCHES ── */

/* ── PRIMARY BUTTON ── */

<body>

<div class="header">
  <div class="header-icon">🇹🇭</div>
  <div class="header-text">
    <div class="header-title">ไทยช่วยไทยพลัส</div>
    <div class="header-sub">บันทึกยอดขายรายสาขา (Real-time Cloud)</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="main">

  <div class="view active" id="view-record">

    <div class="card">
      <div class="card-label">📅 วันที่</div>

      <div class="field">
        <label class="label">วันที่รับเงินเข้าบัญชี</label>
        <input type="date" class="input" id="received-date">
      </div>

      <div class="field">
        <label class="label">วันที่ขายจริง (ลบ 3 วัน อัตโนมัติ)</label>

          <div>

        <button class="branch-pill" data-b="อ่าวอุดม"   onclick="pickBranch(this)">อ่าวอุดม</button>

      <div class="card-label">💰 ยอดเงิน</div>

        <div class="amount-wrap">
          <span class="amount-prefix">฿</span>
          <input type="number" class="input amount" id="amount"
                 placeholder="0.00" inputmode="decimal" step="0.01" min="0">
        </div>
      </div>
      <div class="field">
        <label class="label">หมายเหตุ (ไม่บังคับ)</label>
        <input type="text" class="input" id="notes" placeholder="เช่น โอนมาช้า, แยก 2 งวด…">

      <span>บันทึกยอด</span>
    </button>

  </div><div class="view" id="view-dashboard">

    <div class="card">

        <button class="qbtn" onclick="setRange('lastmonth')">เดือนที่แล้ว</button>

    <span class="nav-icon">📊</span>
    แดชบอร์ด

<script>
// ═══════════════════════════════
// STATE
// ═══════════════════════════════
let selectedBranch = null;
let manualSaleDate  = false;
let currentListenerUnsubscribe = null;

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
function init() {
  document.getElementById('received-date').value = todayStr();
  document.getElementById('received-date').addEventListener('change', refreshSaleDate);
  refreshSaleDate();
  setRange('month');
}

// ═══════════════════════════════
// DATE UTILS
// ═══════════════════════════════
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function dateStrToLocal(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function localToStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function subtractBizDays(dateStr, n) {
  const d = dateStrToLocal(dateStr);
  d.setDate(d.getDate() - n);
  return localToStr(d);
}

function thaiDate(str) {
  if (!str) return '—';
  const [y,m,d] = str.split('-').map(Number);
  const M = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
             'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d} ${M[m]} ${y + 543}`;
}

function thaiNum(n) {
  return Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
}

// ═══════════════════════════════
// SALE DATE
// ═══════════════════════════════
function refreshSaleDate() {
  if (manualSaleDate) return;
  const recv = document.getElementById('received-date').value;
  if (!recv) return;
  const sDate = subtractBizDays(recv, 3);
  const el = document.getElementById('sale-date-text');
  el.textContent = thaiDate(sDate);
  el.dataset.val  = sDate;
}

function toggleSaleDateMode() {
  manualSaleDate = !manualSaleDate;
  const manualInput = document.getElementById('sale-date-manual');
  const toggleBtn   = document.getElementById('edit-sale-toggle');

  if (manualSaleDate) {
    manualInput.style.display = 'block';
    manualInput.value = document.getElementById('sale-date-text').dataset.val || '';
    toggleBtn.textContent = 'ใช้อัตโนมัติ';
  } else {
    manualInput.style.display = 'none';
    toggleBtn.textContent = 'แก้ไขเอง';
    refreshSaleDate();
  }
}

function getSaleDate() {
  if (manualSaleDate) return document.getElementById('sale-date-manual').value;
  return document.getElementById('sale-date-text').dataset.val || '';
}

// ═══════════════════════════════
// BRANCH PICKER
// ═══════════════════════════════
function pickBranch(el) {
  document.querySelectorAll('.branch-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedBranch = el.dataset.b;
}

// ═══════════════════════════════
// SUBMIT TO FIREBASE
// ═══════════════════════════════
async function submitRecord() {
  const receivedDate = document.getElementById('received-date').value;
  const saleDate      = getSaleDate();
  const rawAmount    = document.getElementById('amount').value;
  const amount       = parseFloat(rawAmount);
  const notes        = document.getElementById('notes').value.trim();

  if (!receivedDate)        { toast('❌ ระบุวันที่รับเงินก่อน'); return; }
  if (!saleDate)            { toast('❌ ไม่สามารถระบุวันที่ขายได้'); return; }
  if (!selectedBranch)      { toast('❌ เลือกสาขาก่อน'); return; }
  if (!rawAmount || amount <= 0) { toast('❌ ใส่ยอดเงินก่อน'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span>กำลังบันทึก…</span>';

  try {
    const recordsRef = window.dbRef(window.db, 'sales_records');
    const newRecordRef = window.dbPush(recordsRef);
    
    await window.dbSet(newRecordRef, {
      saleDate: saleDate,
      receivedDate: receivedDate,
      branch: selectedBranch,
      amount: amount,
      notes: notes,
      createdAt: new Date().toISOString()
    });

    toast('✅ บันทึกเข้าคลาวด์สำเร็จ!');
    document.getElementById('amount').value = '';
    document.getElementById('notes').value  = '';
  } catch(e) {
    toast('❌ บันทึกไม่สำเร็จ: ' + e.message);
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = '<span>บันทึกยอด</span>';
}

// ═══════════════════════════════
// DASHBOARD WITH REALTIME STREAM
// ═══════════════════════════════
const BRANCHES = ['อมตะนคร','พระยาสัจจา','บางแสน','อ่าวอุดม'];
const BRANCH_COLORS = {
  'อมตะนคร':   '#1A40AA',
  'พระยาสัจจา': '#D61F26',
  'บางแสน':    '#00AAFF',
  'อ่าวอุดม':  '#FF6B35',
};

function setRange(type) {
  const today = new Date();
  let s, e;
  if (type === 'week') {
    e = new Date(today);
    s = new Date(today); s.setDate(s.getDate() - 6);
  } else if (type === 'month') {
    s = new Date(today.getFullYear(), today.getMonth(), 1);
    e = new Date(today.getFullYear(), today.getMonth()+1, 0);
  } else if (type === 'lastmonth') {
    s = new Date(today.getFullYear(), today.getMonth()-1, 1);
    e = new Date(today.getFullYear(), today.getMonth(), 0);
  }
  document.getElementById('dash-start').value = localToStr(s);
  document.getElementById('dash-end').value   = localToStr(e);
}

function loadDashboard() {
  const start = document.getElementById('dash-start').value;
  const end   = document.getElementById('dash-end').value;
  if (!start || !end) { toast('❌ เลือกช่วงวันที่ก่อน'); return; }
  if (start > end)    { toast('❌ วันเริ่มต้องน้อยกว่าวันสิ้นสุด'); return; }

  const el = document.getElementById('dash-content');
  el.innerHTML = '<div class="loading-state">⏳ กำลังเชื่อมต่อท่อส่งข้อมูล (Real-time)…</div>';

  const recordsRef = window.dbRef(window.db, 'sales_records');
  const q = window.dbQuery(
    recordsRef,
    window.dbOrderBy('saleDate'),
    window.dbStart(start),
    window.dbEnd(end)
  );

  if (currentListenerUnsubscribe) {
    currentListenerUnsubscribe();
  }

  currentListenerUnsubscribe = window.dbOnValue(q, (snapshot) => {
    const records = [];
    if (snapshot.exists()) {
      snapshot.forEach((childSnapshot) => {
        records.push(childSnapshot.val());
      });
    }
    renderDashboard(records, start, end);
  }, (error) => {
    el.innerHTML = `<div class="empty-state"><div class="e-icon">❌</div><p>ดึงข้อมูลหลุด: ${error.message}</p></div>`;
  });
}

function renderDashboard(records, start, end) {
  const el = document.getElementById('dash-content');

  if (!records || records.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="e-icon">🕵️</div><p>ไม่มีข้อมูลในช่วงนี้<br>ลองบันทึกยอดเพิ่มดูครับ</p></div>';
    return;
  }

  const total = records.reduce((s,r) => s + Number(r.amount||0), 0);
  const bData = {};
  BRANCHES.forEach(b => bData[b] = {total:0, count:0});
  records.forEach(r => {
    if (bData[r.branch]) {
      bData[r.branch].total += Number(r.amount||0);
      bData[r.branch].count++;
    }
  });

  const maxBranch = Math.max(...BRANCHES.map(b => bData[b].total), 1);
  const sorted = [...records].sort((a,b) => b.saleDate.localeCompare(a.saleDate));

  let html = `
    <div class="total-card">
      <div class="total-label">ยอดรวม · ${thaiDate(start)} – ${thaiDate(end)} (Live 🟢)</div>
      <div class="total-amount">฿${thaiNum(total)}</div>
      <div class="total-meta">${records.length} รายการ จาก ${BRANCHES.filter(b=>bData[b].count>0).length} สาขา</div>
    </div>

    <div class="card">
      <div class="card-label">📈 ยอดขายรายวัน</div>
      <div class="chart-wrap"><canvas id="chart-daily"></canvas></div>
      <div class="chart-legend" id="chart-legend"></div>
    </div>

    <div class="card">
      <div class="card-label">🏪 เปรียบเทียบรายสาขา</div>
      <div id="branch-compare-rows"></div>
    </div>

    <div class="branch-grid-2">
      ${BRANCHES.map(b => `
        <div class="bcard">
          <div class="bcard-name">${b}</div>
          <div class="bcard-amount">฿${thaiNum(bData[b].total)}</div>
          <div class="bcard-count">${bData[b].count} รายการ</div>
          <div class="bcard-bar">
            <div class="bcard-bar-fill" style="width:${Math.round(bData[b].total/maxBranch*100)}%"></div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="padding-bottom:6px;">
      <div class="card-label">📋 รายการทั้งหมด</div>
      ${sorted.map(r => `
        <div class="record-item">
          <div class="record-left">
            <div class="record-sale-date">${thaiDate(r.saleDate)}</div>
            <div><span class="record-branch-tag">${r.branch}</span></div>
            <div class="record-received-date">รับเงิน ${thaiDate(r.receivedDate)}</div>
            ${r.notes ? `<div class="record-notes">📝 ${r.notes}</div>` : ''}
          </div>
          <div class="record-amount">฿${thaiNum(Number(r.amount))}</div>
        </div>
      `).join('')}
    </div>
  `;

  el.innerHTML = html;
  setTimeout(() => renderCharts(records, start, end, bData, total), 0);
}

// ═══════════════════════════════
// CHARTS
// ═══════════════════════════════
let chartDailyInstance = null;

function renderCharts(records, start, end, bData, total) {
  renderDailyChart(records, start, end);
  renderBranchCompare(bData, total);
}

function renderDailyChart(records, start, end) {
  const dateList = [];
  const cur = dateStrToLocal(start);
  const endD = dateStrToLocal(end);
  while (cur <= endD) {
    dateList.push(localToStr(cur));
    cur.setDate(cur.getDate() + 1);
  }

  const labels = dateList.map(ds => {
    const [,m,d] = ds.split('-');
    return `${parseInt(d)}/${parseInt(m)}`;
  });

  const datasets = BRANCHES.map(b => ({
    label: b,
    data: dateList.map(date =>
      records
        .filter(r => r.saleDate === date && r.branch === b)
        .reduce((s, r) => s + Number(r.amount), 0)
    ),
    backgroundColor: BRANCH_COLORS[b],
    borderRadius: dateList.length <= 14 ? 4 : 2,
    borderSkipped: false,
  }));

  if (chartDailyInstance) { chartDailyInstance.destroy(); chartDailyInstance = null; }

  const canvas = document.getElementById('chart-daily');
  if (!canvas) return;

  chartDailyInstance = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ฿${thaiNum(ctx.raw)}`
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: {
            font: { family: 'Prompt', size: 10 },
            color: '#8A94A6',
            maxTicksLimit: dateList.length <= 14 ? dateList.length : 10,
            maxRotation: 0,
          },
          border: { display: false },
        },
        y: {
          stacked: true,
          grid: { color: '#F0F2F7' },
          ticks: {
            font: { family: 'Prompt', size: 10 },
            color: '#8A94A6',
            callback: v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : v,
            maxTicksLimit: 5,
          },
          border: { display: false },
        }
      },
      animation: { duration: 300 },
    }
  });

  const legendEl = document.getElementById('chart-legend');
  if (legendEl) {
    legendEl.innerHTML = BRANCHES.map(b => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${BRANCH_COLORS[b]}"></div>
        ${b}
      </div>
    `).join('');
  }
}

function renderBranchCompare(bData, total) {
  const container = document.getElementById('branch-compare-rows');
  if (!container) return;

  const sorted = [...BRANCHES].sort((a, b) => bData[b].total - bData[a].total);
  const maxVal = sorted.length ? bData[sorted[0]].total : 1;

  container.innerHTML = sorted.map(b => {
    const pct = total > 0 ? Math.round(bData[b].total / total * 100) : 0;
    const barW = maxVal > 0 ? Math.round(bData[b].total / maxVal * 100) : 0;
    return `
      <div class="compare-row">
        <div class="compare-header">
          <div class="compare-name">
            <div class="compare-dot" style="background:${BRANCH_COLORS[b]}"></div>
            ${b}
          </div>
          <div class="compare-right">
            <span class="compare-amount">฿${thaiNum(bData[b].total)}</span>
            <span class="compare-pct">${pct}%</span>
          </div>
        </div>
        <div class="compare-bar-track">
          <div class="compare-bar-fill" style="width:${barW}%; background:${BRANCH_COLORS[b]}"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════
// NAV
// ═══════════════════════════════
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
}

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
function toast(msg, ms=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), ms);
}

// ═══════════════════════════════
// START
// ═══════════════════════════════
init();
</script>
